name: build-engines

# Builds the native flow_sim engine for each platform and commits the binaries
# into engines/ on this same (non-main) branch, so the flow designer can pick a
# bundled executable with nothing to download. Triggered on changes to the
# engine / simulation sources (never on engines/ itself) or by hand.

on:
  workflow_dispatch:
  push:
    branches: [claude/cpp-engine]
    paths:
      # '+' is the extglob quantifier in GitHub path filters, so match it as a
      # literal via a character class ([+]) — 'salabim++/**' is rejected outright.
      - 'salabim[+][+]/**'
      - 'simulation[+][+]/**'
      - 'engine/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-engines.yml'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-universal
          - os: windows-latest
            name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      # salabim.hpp uses C++20 coroutines that GCC<=13 miscompiles, so Unix
      # builds use Clang. A statically linked libstdc++ keeps the Linux binary
      # portable; the macOS binary is a universal (arm64 + x86_64) slice.
      - name: Build (Linux)
        if: matrix.name == 'linux-x86_64'
        run: |
          clang++ --version
          clang++ -std=c++20 -O2 -static-libgcc -static-libstdc++ \
            -Isalabim++ -Isimulation++ -Iengine -Iengine/third_party \
            engine/main.cpp -o flow_sim-${{ matrix.name }}

      - name: Build (macOS universal)
        if: matrix.name == 'macos-universal'
        run: |
          clang++ --version
          clang++ -std=c++20 -O2 -arch arm64 -arch x86_64 \
            -Isalabim++ -Isimulation++ -Iengine -Iengine/third_party \
            engine/main.cpp -o flow_sim-${{ matrix.name }}

      - name: Build (Windows MSVC)
        if: matrix.name == 'windows-x86_64'
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /std:c++20 /O2 /EHsc /MT /nologo ^
            /I salabim++ /I simulation++ /I engine /I engine\third_party ^
            engine\main.cpp /Fe:flow_sim-${{ matrix.name }}.exe
          del flow_sim-${{ matrix.name }}.obj main.obj 2>nul

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./flow_sim-${{ matrix.name }} flow_designer/sample_flow_rate.json | grep -q '^@@DONE'

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          flow_sim-${{ matrix.name }}.exe flow_designer\sample_flow_rate.json | findstr /b "@@DONE"

      - uses: actions/upload-artifact@v4
        with:
          name: flow_sim-${{ matrix.name }}
          path: flow_sim-${{ matrix.name }}*
          if-no-files-found: error

  publish:
    name: commit binaries to engines/
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/cpp-engine

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries into engines/
        run: |
          mkdir -p engines
          # flatten the per-artifact folders into engines/
          find artifacts -type f -name 'flow_sim-*' -exec cp {} engines/ \;
          chmod +x engines/flow_sim-linux-x86_64 engines/flow_sim-macos-universal 2>/dev/null || true
          ls -l engines/

      - name: Commit and push (skip ci to avoid a rebuild loop)
        run: |
          git config user.name  'flow-simulator-ci'
          git config user.email 'ci@users.noreply.github.com'
          git add -f engines/
          if git diff --cached --quiet; then
            echo "engines/ unchanged — nothing to commit"
          else
            git commit -m "ci: rebuild native engines [skip ci]"
            git push origin HEAD:claude/cpp-engine
          fi

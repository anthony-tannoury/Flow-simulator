name: build-engines

# Builds the native flow_sim engine for each platform and commits the binaries
# into engines/ on the branch that triggered the run, so the flow designer can
# pick a bundled executable with nothing to download. Triggered on changes to
# the engine / simulation sources (never on engines/ itself) or by hand.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/latest-commit-check-tl51wu
      - associative_dissociative_test
      - associative_dissociative_test_B
    paths:
      # Match by extension: GitHub path filters reject any '+' in the pattern
      # (extglob), so 'salabim++/**' / 'simulation++/**' can't be written — but
      # the '++' in the actual file path is fine, and '**/*.hpp' matches it.
      - '**/*.hpp'
      - '**/*.cpp'
      - 'CMakeLists.txt'
      - '.github/workflows/build-engines.yml'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-universal
          - os: windows-latest
            name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      # salabim.hpp uses C++20 coroutines that GCC<=13 miscompiles, so Unix
      # builds use Clang. A statically linked libstdc++ keeps the Linux binary
      # portable; the macOS binary is a universal (arm64 + x86_64) slice.
      - name: Build (Linux)
        if: matrix.name == 'linux-x86_64'
        run: |
          clang++ --version
          clang++ -std=c++20 -O2 -static-libgcc -static-libstdc++ \
            -Icpp/salabim++ -Icpp/simulation++ -Icpp/engine -Icpp/third_party \
            cpp/engine/main.cpp -o flow_sim-${{ matrix.name }}

      - name: Build (macOS universal)
        if: matrix.name == 'macos-universal'
        run: |
          clang++ --version
          clang++ -std=c++20 -O2 -arch arm64 -arch x86_64 \
            -Icpp/salabim++ -Icpp/simulation++ -Icpp/engine -Icpp/third_party \
            cpp/engine/main.cpp -o flow_sim-${{ matrix.name }}

      - name: Build (Windows MSVC)
        if: matrix.name == 'windows-x86_64'
        shell: cmd
        run: |
          rem Locate whatever VS edition the runner has (Enterprise/Community/BuildTools)
          rem instead of hardcoding a path that varies across runner images.
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          cl /std:c++20 /O2 /EHsc /MT /nologo ^
            /I cpp\salabim++ /I cpp\simulation++ /I cpp\engine /I cpp\third_party ^
            cpp\engine\main.cpp /Fe:flow_sim-${{ matrix.name }}.exe
          del main.obj 2>nul

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./flow_sim-${{ matrix.name }} flow_designer/sample_flow_rate.json | grep -q '^@@DONE'

      - name: Regression pin (run1.json must produce exactly 9924 pieces)
        if: matrix.name == 'linux-x86_64'
        run: |
          ./flow_sim-${{ matrix.name }} "Test runs/run1.json" | tail -1 | grep -F '"pieces":9924'

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          flow_sim-${{ matrix.name }}.exe flow_designer\sample_flow_rate.json | findstr /b "@@DONE"

      - uses: actions/upload-artifact@v4
        with:
          name: flow_sim-${{ matrix.name }}
          path: flow_sim-${{ matrix.name }}*
          if-no-files-found: error

  publish:
    name: commit binaries to engines/
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries into engines/
        run: |
          mkdir -p engines
          # flatten the per-artifact folders into engines/
          find artifacts -type f -name 'flow_sim-*' -exec cp {} engines/ \;
          chmod +x engines/flow_sim-linux-x86_64 engines/flow_sim-macos-universal 2>/dev/null || true
          ls -l engines/

      - name: Commit and push (skip ci to avoid a rebuild loop)
        run: |
          # The github-actions bot identity: 'ci@users.noreply.github.com' is the
          # no-reply address of the real GitHub user 'ci', so commits made with it
          # were being attributed to that unrelated account in the contributor list.
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f engines/
          if git diff --cached --quiet; then
            echo "engines/ unchanged — nothing to commit"
          else
            git commit -m "ci: rebuild native engines [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin "HEAD:${{ github.ref_name }}"; then
                break
              fi
              git pull --rebase -X theirs origin "${{ github.ref_name }}"
            done
          fi
